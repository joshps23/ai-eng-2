name: CI

# Run the agent-harness test suite on every push and pull request so the
# learning resource's runnable code stays correct as it evolves. The suite is
# fully offline (a FakeClient stands in for the API), so no secrets are needed.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Match the guide's stated floor (3.10+) across current Pythons.
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: agent-harness-guide/code

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install the package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run tests
        # python -m pytest (not bare pytest) binds the same interpreter we
        # installed into — the gotcha the README and FAQ call out.
        run: python -m pytest -q

  notebooks:
    name: execute notebooks (offline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-harness-guide

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install the package with notebook tooling
        run: pip install -e "./code[dev,notebooks]"

      - name: Check jupytext pairs are in sync
        # Notebooks are reviewed as py:percent files; the .ipynb (with committed
        # FakeClient outputs) must always match its .py pair.
        run: |
          jupytext --sync notebooks/*.ipynb
          git diff --exit-code notebooks/

      - name: Execute every notebook headlessly (FakeClient path)
        env:
          OPENAI_API_KEY: ""   # guarantee the offline path
        run: |
          for nb in notebooks/*.ipynb; do
            echo "== $nb"
            jupyter execute --kernel_name=python3 --timeout=120 "$nb"
          done

  site:
    name: regenerate HTML site (drift gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-harness-guide/site

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install generator deps (pinned — pygments markup must be deterministic)
        run: pip install "markdown==3.10.2" "pygments==2.20.0"

      - name: Regenerate and require zero drift
        # The committed HTML must exactly match what build_site.py produces from
        # the current markdown — the same doctrine as the jupytext sync check.
        run: |
          python build_site.py
          git diff --exit-code html/

  evals:
    name: persona evals (offline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-harness-guide/evals

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install jupytext (the notebooks suite's pair-sync check uses it)
        run: pip install jupytext

      - name: Run every persona eval suite
        # Deterministic, offline: the suites read the committed markdown,
        # notebooks, and generated site (kept current by the `site` drift gate)
        # and assert each persona's standards. >=200 cases per persona.
        run: python run_all.py
